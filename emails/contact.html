<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Nytt kontaktformulär - Björnsta Consulting</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #1a5c38;">Nytt meddelande från bjornsta.se</h2>
  <table style="width: 100%; border-collapse: collapse;">
    <tr><td style="padding: 8px; border-bottom: 1px solid #eee; font-weight: bold;">Namn:</td><td style="padding: 8px; border-bottom: 1px solid #eee;">{{ name }}</td></tr>
    <tr><td style="padding: 8px; border-bottom: 1px solid #eee; font-weight: bold;">Företag:</td><td style="padding: 8px; border-bottom: 1px solid #eee;">{{ company }}</td></tr>
    <tr><td style="padding: 8px; border-bottom: 1px solid #eee; font-weight: bold;">E-post:</td><td style="padding: 8px; border-bottom: 1px solid #eee;">{{ email }}</td></tr>
    <tr><td style="padding: 8px; border-bottom: 1px solid #eee; font-weight: bold;">Telefon:</td><td style="padding: 8px; border-bottom: 1px solid #eee;">{{ phone }}</td></tr>
    <tr><td style="padding: 8px; border-bottom: 1px solid #eee; font-weight: bold;">Språk:</td><td style="padding: 8px; border-bottom: 1px solid #eee;">{{ language }}</td></tr>
    <tr><td style="padding: 8px; border-bottom: 1px solid #eee; font-weight: bold;">Tjänst:</td><td style="padding: 8px; border-bottom: 1px solid #eee;">{{ service }}</td></tr>
    <tr><td style="padding: 8px; border-bottom: 1px solid #eee; font-weight: bold;">Meddelande:</td><td style="padding: 8px; border-bottom: 1px solid #eee;">{{ message }}</td></tr>
  </table>
  <p style="color: #666; font-size: 12px; margin-top: 20px;">Skickat från bjornsta.se kontaktformulär</p>
</body>
</html>
